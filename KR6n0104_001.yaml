body:
  text: 明匡山五乳廣益纂釋言大者揀小為義謂揀小乘唯是七十五法大乘則有百法乘者運載得名謂如世舟車可以運重致遠以喻菩薩乘此大法越生死河到菩提鄉登涅槃岸名義互言亦可說揀小得名運載為義百者數目也法者模範也謂世間法九十四種出世間法六種其數有百謂心法有八心所有法五十一色法有十一不相應行法有二十四無為法有六此為大乘之百法明者乃菩薩無漏之慧以能破無明暗故為智明以揀凡夫有漏慧不能破煩惱也門者以開通無壅滯義謂此百法乃凡聖共由之門又明此百法即是入大乘之門也論者決擇義謂揀擇性相教誡後學決斷疑惑故以為論乃天親菩薩於瑜伽本地分中六百六十法內提綱挈領略錄此百法名數以示後學使知其萬法之大要也攝此百法世出世間一切聖凡皆執有我故招分段變易二種生死若能分明了悟悉皆無我則超二死聖凡情盡即此便是入大乘之門故云大乘百法明門又明字乃能觀之智百法即所觀之境此智此境皆入大乘之門也又論者決擇境智分明無惑而已以心境皆空法門殊非小根可受故此理觀皆屬大乘故標云乃大乘之百法明門依主釋也天親菩薩造此造論人名也論中百法乃佛所說一大藏中所演通名萬法佛滅度後慈氏菩薩愍念邪見眾生難入正法故從兜率天降神中印土阿瑜陀國為無著菩薩說瑜伽論統收萬法括為六百六十法名理殆盡論文百卷大約五分一本地分二攝決擇分三攝識分四攝義門分五攝事分後天親菩薩因見文繁仍於此論本地分中略錄百法名數使萬法根宗歸於指掌若疏九河導萬派而歸於海最簡最要其實祖述先哲以條然成章故亦云造菩薩氏族具如別傳茲不繁錄唐三藏法師玄奘奉詔譯此譯師名也玄奘初至西域首于那蘭陀寺親誡賢論師習相宗法門而唯識宗旨獨得其傳折伏異見制諸外道聲振五天故持此論歸大唐奉太宗之詔而譯之譯者易也易梵語而為華言故云譯也如世尊言一切法無我如世尊言者原為佛說乃論主推尊法有所自一切法無我者謂百法及二無我也世尊乃說法之主一切法乃所說之法而云無我者則說無所說矣何也以佛本無法可說亦無實法與人但就眾生所執之情隨宜而擊破之耳且一切法者乃世出世間一切聖凡之法也以凡夫妄執五蘊身心假我為我外道妄執神我等為我小乘妄執所取涅槃偏見為我菩薩妄見有生可度有佛可求非我不能於所證真如有證有得亦未忘我斯則世間凡夫外道出世三乘皆是有我執者故佛總以一箇無字破之曰一切法無我謂一切法本來無我故知一切法者乃眾生所執之法非佛說也以眾生妄執為有佛但云無之而已豈有法耶此一無字亦不得已而為破執之具耳又何有實法與人哉噫此吾佛說法之標旨而為萬法之宗本故論標以示人意曰當如世尊言應知一切諸法無我學者苟達無我則於大乘法門思過半矣何等一切法云何為無我此設疑問意在欲人了悟知一切法本自無我也以問有五種一利樂有情問謂菩薩知一切無我而眾生不知為欲利樂故問於佛使其了悟革凡成聖也二不解問謂自己於一切事理不明而問於人也三愚癡問謂愚暗癡迷於理事不分而問於人也四試驗問謂以己所知問於他人以驗他知不知也五輕觸問謂我慢無狀而戲問於人也此菩薩設此一問即五問中利樂有情問也設有二問先釋初問一切法者略有五種一者心法二者心所有法三者色法四者心不相應行法五者無為法此標數列名以釋疑也以前問不知何等為一切法又不知何者為無我故此答云通而言之以眾生情欲無量其實應機之法亦無量演為三藏共有九部今撮其綱宗略有五種耳然此五種前四乃答有為法後一乃出世間無為法且此五法若但有四即名凡夫外道但見後一即名偏空小乘若即有為而便見無為乃即世間而出世間名為大乘菩薩一者最勝故二與此相應故三所現影故四分位差別故五所顯示故如是次第此釋前列名次第所以也一列心法為首者以三界上下法唯是一心作一切聖凡染淨因果依心而立此為最勝故列為首二與此相應者乃前心所有法也然心王本無善惡不能獨造必假隨從方有勢力而從者必叶和於主方得內外相應堪成事業故心家所有之法乃心使也與心相應方能造業故列其次三所現影者即前色法也謂此色法本非外來乃八識之相分即自心之影像八識如鏡而此色法如鏡中像以色不自色因心變現以八識通為能變相分為所變要顯色本唯心云所現影故列第三四分位差別者即前心不相應行法也此雖心家所有但不與心相應總前三位妄計法中分位之差別耳故又次之此上四位乃有為法也造論之意要即此有為便欲顯示無為以所顯示者本無為故故終繫之以此故云如是次第第一心法略有八種一眼識二耳識三鼻識四舌識五身識六意識此列前六識之名皆從所依之根而立也具有五義謂依發屬助如除根發之識餘四皆依根之識依主也根所發之識依士也經云元依一精明分成六和合精明乃八識之體也本唯真心迷之而成八識今於六門而了境故有六種之名以映眼時能分別色即名眼之識等譬如一室中藏一箇獼猴六處有人隨呼而應故有別耳且前五識依五根得名但有照用最初一念照境元無分別然第二念有分別者即屬意識是則前五乃依五色根之識第六乃意所發之識以第七意為六之根故補註云雖六識身皆依意轉此隨不共意識名依發等故五識身無相濫矣或唯依意故名意識辨識得名心意非例補義云此辨六識依根得名也問曰前六識身皆依意轉應俱名意識何故第六獨得意識之名耶況教說心意意識轉此則明知前六同名意識今言意識豈不與前五濫同一名耶論答曰雖六識身皆依意轉但此隨根立名如前五識各有所依之根今此第六識則不共前五以獨依意為根立意識名乃意之識如五識身依色等根以唯依意故名意之識依主釋也此中正是辨識得名不可執前六共為一意為相濫也此言各從所依根立名故不相濫耳若言前六共依意轉則六與前五濫而為一今辨各有所依之根而六唯依意為根故名意識豈與前五相濫耶謂轉則共而依根則不共矣此乃辨識依根得名教說心意識轉別是一義故結云心意非例七末那識此第七識乃相應立號也具足應云訖利瑟吒耶末那此翻染污意謂貪嗔見慢四惑常俱故名染污恒審思量名之為意恒常審察思量計第八為我如是思量唯第七有餘識所無故獨得名意復能了別名之為識問前第六名意識今此識亦名意何也曰第六識依根得名此識當體立號第六識雖能分別五塵好惡而由此識傳送相續執取依根者根乃第七識也當體即分別之體也八阿賴耶識此第八識乃功能受稱也由具三藏義故名為阿賴耶真諦的體翻為無沒以真如隨生死遷流而不失不壞故云無沒奘師就義翻為藏識謂能含藏諸法種故藏有三義謂能藏所藏我愛執藏以能含藏善惡種子歷劫不壞約持種義邊名為能藏又此識是前根身器界善惡種子所藏之處約受熏義邊名為所藏又此藏識是末那堅執為自內我故云我愛執藏由斯三義而得藏名藏即識也乃持業釋故曰功能受稱楞伽云識藏如來藏以此識乃真如在纏之名即眾生之佛性萬法之根宗善惡之本元聖凡之歸宅以世出世間染淨諸法皆依此識之所變現故云萬法惟識者此也此上八識名異體同總名心王其次五十一心所法皆心王之使但各具多寡之不同故奘師作八識頌以規矩之第二心所有法略有五十一種分為六位一遍行有五二別境有五三善有十一四煩惱有六五隨煩惱有二十六不定有四此列五十一心所法之分位也心所者心家所有之法也恒依心起與心相應繫屬於心具此三義故名心所如屬我物得我所名然此心所隨善惡境起憎愛等助成心事故得心所之名以凡起心動念不出善惡二途故有六位之差耳其遍行者即心無故所起之念乃習氣內熏而發者也別境者乃各別緣境而得生故惟此二門不出善惡之間其善心所止有十一而惡心所則有根本煩惱六隨煩惱二十此則善習少而惡習多宜乎善人少而不善者多也其不定四法則善惡皆有此上總標名位向下隨次別釋一遍行五者謂意觸受想思此釋心所法初中名義也言遍行者遍乃周遍所謂無處不至也行乃心行即能緣之心其境乃心行之處為所緣耳此五心所以遍有四一切謂遍一切善惡之性遍一切三界九地遍一切長短之時遍一切識於八個識中同時俱起不問何心但起便有故得此名謂凡在有情分中未能離念者皆具此也然此雖列五名總為一心以此五法具足取境之識一念方成此下先引本論後用新疏釋之義不足者補之補義瑜伽以作意為首識論以觸為首以瑜伽約二乘及權教菩薩觀行皆依作意而修此通凡聖識論以觸為首直就三和生觸乃以境為先是單就識說但屬凡夫有此不同從來未辨一作意者謂能警心為性體也於所緣境引心為業用也謂此警覺應起心種引令趣境故名作意作意者謂生心動念之始也謂警心令起引心趣境是其體用警覺有二義一令心未起而起二令心已起者令引趣境問作意為在種位警心為在現行答在種位以彼自性明利雖在種位若有境至而能警心令生現行喻如多人同宿一室外有賊至中有一人其性少睡便能警覺餘人此人自身雖未曾起而能警覺餘人令起作意種子既能警彼諸心種生現行又能令心現行趣所緣境初是體性次是業用補義謂八識湛淵之體本來無念因種子內熏皷動便有作意此時未分善惡但有動念故不引心所二觸者為三和分別變異令心心所觸境為性受想思等所依為業補義觸謂三和分別變異者此言觸有實自性是實非假也言三和者謂根境識也言分別者謂三和時尚未生心所以和而未取猶屬似現量尚居本位故今觸即取境之念纔一取著則粘動湛體遂生美惡之心所故云分別謂此取之一念亦似前三有順生心所功能故論以相似釋分別也變異者謂由取著則令前三變異失其本體則為比量矣令心心所觸境為性者此言觸之功能謂心心所全仗觸力方能引令觸境也受想思等所依為業者言心雖觸境境復觸心心境和合引起善惡習氣將生心所但含而未發故云為受想思等所依也經云自心取自心非幻成幻法不取無非幻甚言取之一法為患甚大故今論說根境識三縱和一處非觸不能起善惡行故觸有實體用也此觸義最微非一取字無以發明三受者謂領納違順俱非境相為性起愛為業能起合離非二欲故受者謂領納也領謂收領納謂容納若領納違境則起心欲離若領納順境則起心欲合若領納非違非順境則起平平雖不欲合亦不欲離此受性也為欲所依故能起愛是受用也四想者謂於境取相為性施設種種名言為業謂要安立境分齊相方能隨起種種名言想者謂境風飄鼓安立自境施設名言是其體用安立者即取像義謂此意想先於色聲等境安立分齊而取像由取像故後起名言此是色是聲等五思者令心造作為性於善品等役心為業謂能取境正因等相驅役自心令造善等思者能取正因邪因籌量可行不可行是其體性驅役自心造善造惡成邪成正是其業用問作意與思何異答作意如馬行思如騎馬者馬但直行不能避險就平以由騎者令其避就思惟亦爾令彼作意不得漫行脫邪就正故曰欲吾知爾本意以思想生吾不思想爾則爾而不生又語云思無邪又云慎思之又云三思而行補義由作意而於思則善惡之念已成決不能止故下別境乃必作之心也二別境五謂欲解念定慧言別境者以五心所所緣之境各各不同非如遍行同緣一境謂別別緣境而得生故以四境別名為別境也謂欲所樂境解所決定境念曾所習境定於所觀境慧則於四境揀擇為性故不同偏行耳補義此五心所乃必作之心也善惡皆然修行亦爾一欲者於所樂境希望為性勤依為業欲者於所樂境希取冀望是其體性精進為依是其業用謂於所愛境希望必合於所惡境希望必離所謂愛之欲生惡之欲死是知欣厭皆名欲也故世出世法無不皆由好樂而成故好樂世間法成世間果好樂出世法成出世間果甚矣好樂之不可不正也古人尅期求證無上菩提者好樂之力也補義佛說眾生有種種欲不獨菩提下四皆然二勝解者謂於決定境印持為性不可引轉為業謂邪正等教理證力於所取境審決印持由此異緣不能引轉故猶豫境勝解全無非審決心亦無勝解由斯勝解非遍行攝勝解者謂於境決知其可作不能引轉也言決定印持不可引轉者謂藉邪教正教邪理正理據證之力故於所取之境詳審明決印定持守由此異緣不能牽奪故名勝解如說色如聚沫受如水泡想如陽𦦨行如芭蕉識如幻境如是決定增勝不可引轉語云三軍可奪帥匹夫不可奪志古德云任爾非心非佛我自即心即佛是也若半疑半信若存若亡名猶豫境決無勝解若雖印持而無一刀兩段審決之心亦無勝解由此勝解非遍行攝也又此欲解性攝善惡無記三性如後懈怠中說三念者於曾習境令心明記不忘為性定依為業謂數憶持曾所受境令不忘失能引定故念者謂於可作境令心分明記取不忘也曾習者即串習事也明記不忘定依為業者謂惺惺不昧歷歷分明念茲在茲不暫忘失如此用功亂想自定名為正念古人云一念萬年萬年一念是也四定者於所觀境令心專注不散為性智依為業謂觀得失俱非境中由定令心專注不散依斯便有決定智生心專注言顯所欲住即便能住非唯一境也定者謂於所觀境專注一心也言所觀境者謂五蘊等無常苦空等專注不散定依為業者謂日用尋常境中用心觀察何者為色何者為受色是甚麼受是甚麼等如此專注一心不亂自然有個入處由斯本明自露決擇智生言心專注者表顯此心欲何境即能令心住於此境非是獨指一境言也補義此解但依禪定而言未通世間法如注瓦承蜩皆定力也何獨參禪五慧者於所觀境簡擇為性斷疑為業謂觀得失俱非境中由慧推求得決定故慧者謂於所作境了然不疑也言簡擇斷疑者謂於諸法得失境中由以慧心推求簡別後方決定心無疑惑此慧從定而發所謂因定生慧善惡皆然故定與慧如車兩輪如鳥兩翼缺一不可必由定而發慧由此得決定故云一心不動名入諸禪了境無生名為般若補義世智辯聰亦名黠慧三善十一者謂一信二精進三慚四愧五無貪六無嗔七無癡八輕安九不放逸十行捨十一不害此列善法之名也下論釋其相一信者於實德能深忍樂欲心淨為性對治不信樂善為業然信差別略有三種一信實有謂於諸法實事理中深信忍故二信有德謂於三寶真淨德中深信樂故三信有能謂於一切世出世善深信有力能得能起希望故由斯對治不信彼心愛樂修證世出世善忍謂勝解此即信因樂欲謂欲即是信果確陳此信自相是何豈不適言心淨為性此信澄清能淨心等以心勝故立心淨名如水清珠能清濁水又諸染法各別有相唯有不信自相渾濁復能渾濁餘心心所如極穢物自穢穢他信正翻彼故淨為相此下釋信十一心所也言信者乃誠信不疑也一信實有者謂於諸佛所說世出世間實事實理正因正果皆能深信而能忍可于心不為謬事謬理邪因邪果之所引轉此是信因二信有德者謂於三寶有法身般若解脫真淨之德深信好樂不為數論三德勝論十四德等之所惑亂三信有能者謂於一切有漏善及無漏善深信凡肯用力於此者皆能得果能成道業於是生希有心而求必得此二是信果由斯信力對治不信愛樂修證世出世善而為業用故曰信為道源功德母信能必到如來地問深忍樂欲是信因果如何是信之自體答前豈不言心淨為性然信之自性澄清能淨染污心心所法以心勝故立心淨名不及心所如水清珠入水一寸水清一寸入水一尺水清一尺故曰清珠投於濁水濁水不得不清淨信投於穢心穢心不得不淨矣補義信如水清珠人雜亂之心如濁水若見佛像一起信敬之心心便清淨二精進者謂於善惡品修斷事中勇悍為性對治懈怠滿善為業勇表精進簡諸染法悍表精純簡淨無記即顯精進唯善性攝言精進者謂勇於改惡遷善也善惡修斷事者即未生善令生已生善令廣未生惡遏令不生已生惡斷令不續言勇表勝進者謂念念高勝增進不退也若行染法設雖增長望諸善品皆名為退不得名進故捍表精純者如浣垢衣以潔白為主故斷惡以純善為主故此精純屬善法以用力故淨不同無覆無記之自性淨故由此二義顯此精進是善性攝故三慚者依自法力崇重賢善為性對治無慚止息惡行為業謂於自法尊貴增上羞恥過惡對治無慚息諸惡行言慚者乃羞慚也謂依自身生尊重增上又於大法起貴重增上謂我有此巍巍堂堂七尺之軀又具得昭昭靈靈之佛性不為善事乃作諸惡不亦慚乎由此二種增上力故凡見一切賢善有德之人皆生尊敬心生隆重想待之如父事之如師復羞自己之過有過必改恥自己之惡有惡必改故能對治無慚諸惡不作也四愧者依世間力輕拒暴惡為性對治無愧止息惡行為業謂依世間訶厭增上輕拒暴惡羞恥過罪對治無愧息諸惡業言愧者自恥之心也謂依世間譏訶增上及他人厭惡增上言如此人作如此事可增可厭我今為人如此憎厭不亦愧乎由此二種增上之力見暴戾之人輕而不近見作惡之人拒而不親復羞昔日之無知恥曾犯之過惡故能對治無愧息諸惡行也五無貪者於有有具無著為性對治貪著作善為業此下無貪等三法名根者以生善之功最勝故如草木之有根祇而後生幹生莖生枝生葉故近能對治三不善根故有者三有果有具者三有因言無貪者謂於三界因果厭離而無愛著是其體性對治愛著作善是其業用六無瞋者於苦苦具無恚為性對治瞋恚作善為業善心起時隨緣何境皆於有等無著無恚觀有等立非要緣彼如前慚愧觀善惡立故此二種俱遍善心言無瞋者謂於三界苦果及三界苦因不生瞋恚是其體性正對治瞋作善是其業用問此無貪瞋二善根所緣之境有異應不俱有不遍善心答善心起時隨緣遇何境皆於有有具苦苦具但於境上無著無恚而已是觀有等苦等以觀心立此二名不是要緣彼有等苦等為境也如前慚愧二法亦是觀善惡而立二名亦非緣彼善惡為境也故此二法俱遍善心七無癡者於諸事理明解為性對治愚癡作善為業言癡者即無明今於諸事理分明解了故云無癡以明解為無癡體諸事理者略即四諦廣即十二因緣於彼起加行故能明解對治無明作善是其業用八輕安者謂遠離麤重調暢身心堪任為性對治沉轉依為業謂此伏除能障定法令所依止轉安適故言輕安者言貪癡麤重故令身心昏沉今遠離麤重沉故輕能令身心調適暢悅故安使行人能堪任事而為其性對治昏沉轉依而為業用次轉釋謂此伏除昏沉障定之法令所依止麤重身心轉為輕安暢適故九不放逸者精進三根於所斷修防修為性對治放逸成滿一切世出世間善事為業謂即四法於斷修事皆能防修名不放逸非別有體無異相故於防惡事修善事中離四功能無別用故言不放逸者即是精進三根上防修之功能謂於所斷惡防令不起於所修善事引令增長故云功能即此防修是其體性對治放逸成就圓滿一切善事是其業用演義云勤智守心不犯塵境名不放逸又云不放逸根深固難拔因不放逸一切善根皆得增長次釋此不放逸別無體性即是精進三根於斷惡修善事中皆能防修即此防修一分功能名不放逸非離四法別有不放逸體以與四法無異根故十行捨者精進三根令心平等正直無功用住為性對治掉舉靜住為業謂即四法令心遠離掉舉等障靜住名捨平等正直無功用住初中後位辨捨差別由不放逸先除雜染捨復令心寂靜而住此無別體如不放逸離彼四法無相用故能令寂靜即四法故所令寂靜即心等故言行捨者即是精進三根能令自心平等正直不假功用自然安住以此為體由此能令心遠離掉舉等障而得靜住是其業用故名為捨以其能捨麁重沉掉故心得靜住此即四禪之捨定也是善性攝非是無記言平等正直無功用行初中後位辨捨差別者謂初捨掉舉行心得平等中捨邪曲行心得正直後捨有功用行心得無功用住此捨之差別相也然此行捨離四法外亦無別體如不放逸離四無有別相用故補義言此行蘊中捨謂眾生念念攀緣者乃貪瞋癡也以此三法令心掉舉今既捨彼三則心不掉舉故心平等以精進力故增進至無功用也十一不害者於諸有情不為損惱無嗔為性能對治害悲愍為業謂即無嗔於有情所不為損惱假名不害無嗔翻對斷物命嗔不害正違損惱物害無嗔與樂不害拔苦是謂此二麤相差別理實無嗔實有自體不害依彼一分假立為顯慈悲二相別故利樂有情彼二勝故言不害者即是無嗔於有情處不為傷損不為觸惱假立此名問何故一體而立二名答以對治有異故無嗔翻對傷物命之瞋不害正違損物命之害無嗔是慈故能與樂不害是悲故能拔苦是顯無嗔與不害相之差別也以嗔則現行身口甚則能傷物命故今若以理細推無嗔有體不害但不損惱未必現於行事故為假立問不害既即是無嗔何須別立答為顯慈悲二相有別亦顯利益彼二勝故四根本煩惱六者謂貪嗔癡慢疑惡見此六種乃一切煩惱之根本煩惱皆由此而生長故一貪者謂於有有具染著為性能障無貪生苦為業謂由愛力取蘊生故言貪者於五取蘊躭染愛著為性輪廻三界能生苦果為業謂由此貪愛為因於三界取蘊苦果生生不斷所謂愛欲為因愛命為果又云有謂後有三有異熟之果有具謂彼惑業所感中有及器世間也二嗔者謂於苦苦具憎恚為性能障無嗔不安隱性惡行所依為業謂嗔必令身心熱惱起諸惡業不善性故言嗔者謂忿怒也苦謂生老等八苦苦具謂一切有漏但能生苦者皆名苦具以憎嫉忿恚而為自體謂由憎嫉而起嗔恚故以憎恚為體能障無嗔心不安隱及諸惡行所依而為業用謂嗔一起舉身燥熱心復惱悶諸所惡業皆從此起諸不善心皆從此出故曰一念嗔心起八萬障門開又云嗔於羣生損害為性住不安隱及惡行所依為業不安隱者謂損害他自生苦故三癡者謂於諸事理迷闇為性能障無癡一切雜染所依為業謂由無明起疑邪見貪等煩惱隨煩惱業能招後生雜染法故言癡者謂無明也有二種一根本無明多迷諦理二枝末無明多迷事相謂於理事不能明了昏迷暗昧而為體性能障無癡善根生煩惱業故云一切雜染所依也次轉釋謂由無明能起根本煩惱隨煩惱業又能招感後生苦果故知一切染法皆依無明而有若離無明無有起處故四慢者謂恃己於他高舉為性能障不慢生苦為業謂若慢於有德有德心不謙下由此生死輪轉無窮受諸苦故言慢者謂我慢也以恃己尊勝貢高輕舉藐視一切是其自體生苦是用次轉釋謂彼平生不以德業為事故慢於有德以於一切有尊德者不生謙恭不自卑下自高自大輕陵蔑裂由此生死無窮受苦不盡故慢有七種皆以我慢為主故此單說我慢五疑者謂於諸諦理猶豫為性能障不疑善品為業謂猶豫者善不生故言疑者無決定見也謂於無我諦實之理無決定見狐疑不信不能決意直前修諸善業故善不生此疑依六事而生一聞不正法二見師邪行三見所信受意見差別四性自愚魯五甚深法性六廣大教法由此六種疑方生故六不正見者謂於諸諦理顛倒推求染慧為性能障善見招苦為業謂邪見者多受苦故此見差別復有五種言不正見為顛倒者謂以正為邪以邪為正染慧而為體性招感積集一切苦事而為業用謂惡見者以苦捨苦此世他世多受苦故此一惡見行相差別復有五種一薩迦耶見謂於五取蘊執我我所一切見趣所依為業薩迦耶者此云身見執身為我起諸見故謂於五取蘊法執我我所由此身見一切見趣依之而起二邊執見謂即於彼隨執斷常障處中行出離為業邊見者謂此邊執皆是薩迦耶見增上之力隨彼所執起斷常見障處中道出離而為業用三邪見謂謗因果作用實事及非四見諸餘邪執如增上緣名義遍故邪見者謂謗無因果破壞正見也此見如增上緣四見所不攝者皆此見攝謂一切惡見皆依此起也謗因果作用實事者瑜伽云謂依世間諸靜慮故見世施主一期壽命恒行布施無有斷絕從此命終生下賤家貧窮匱乏彼作是思定無施與愛養祠祀故意謂作善而無好報此乃謗無因果也四見取謂於諸見及所依蘊執為最勝能得清淨一切鬪諍所依為業見取者謂取他見為己見謂於前三見及自所依蘊隨執一端以為最為勝即其所執為能得清淨由是各各互執為勝一切鬪諍依之而起故曰一切鬪諍所依為業五戒禁取謂於隨順諸見戒禁及所依蘊執為最勝能得清淨無利勤苦所依為業戒禁者謂持牛狗等戒及自拔髮薰鼻僧佉定慧等由執彼因果皆為最勝為清淨為解脫為出離依此進修毫無利益枉受勤苦故曰無利勤苦也昔有二外道一名布剌拏雉迦受持牛戒二名額剃剌羅棲儞迦受持狗戒二人異時往佛所種種愛語相慰問已時布剌拏問世尊曰此棲你持狗戒修道已滿當生何處世尊告曰汝止莫問再三請佛佛乃告言受持狗戒若無缺犯當生狗中若有缺犯當墮地獄彼聞佛言悲泣哽咽不能自勝世尊告曰吾先告言止不須問今果懷恨時布剌拏言不意此人當生狗趣故我悲泣然我長夜受持牛戒將來亦當爾耶唯願大慈為我宣說世尊告曰准前狗戒此等皆由不了真道妄執邪因五隨煩惱二十者謂忿恨惱覆誑諂憍害嫉慳此十為小隨無慚與無愧此二為中隨不信及懈怠放逸并沉掉舉失正念不正知散亂此八為大隨言隨煩惱者以隨他根本煩惱而生故言小中大者以隨有三義謂自類俱起徧不善性徧諸染心具三名大具二名中俱無名小以行相麤猛各自為主然忿等十法唯於不善心中各別而起若一生時必無第二故名為小其無慚無愧乃自類俱起但遍不善性不通有覆但得名中其不信等八自類俱起遍染二性不可名小染心皆遍不得名中二義既殊故名為大也一忿者謂依對現前不饒益境憤發為性能障不忿執仗為業謂懷忿者多發暴惡身表業故此即瞋恚一分為體忿者怒發也謂依對目前不饒益境憤怒發起是其體性執持器仗是其業用謂忿怒多發暴惡身表業故瑜伽云若瞋恚纏能令面貌慘烈奮發若煩惱纏能令發起執刀仗鬪訟違諍故名憤發瞋一分攝二恨者謂由忿為先懷惡不捨結怨為性能障不恨熱惱為業謂結恨者不能含忍恒熱惱故此亦瞋恚一分為體離瞋無別恨相用故恨者由先有忿懷惡不捨遂成冤結每一思之身熱心惱以結恨者皆由不能含容忍耐如火燒心恒熱惱故瞋一分攝三惱者謂忿恨為先追觸暴熱狼戾為性能障不惱䖧螫為業謂追往惡觸現違緣心便狼戾多發囂暴凶鄙麤言䖧螫他故此亦瞋恚一分為體離瞋無別惱相用故惱者由忿恨在先於是追思往惡觸現違緣心發暴熱兇狼乖戾多出喧囂暴惡麤俗鄙陋之言螫他人故蛆謂蝍蛆即蜈蚣也螫謂奮毒傷人也此亦瞋一分攝四覆者謂於自作罪恐失利譽隱藏為性能障不覆悔惱為業謂覆罪者後必悔惱不安隱故此覆癡一分攝覆者藏護也謂平生所作過惡恐失利養名譽隱藏遮護唯恐人知是其性也若覆罪而發露後時必自悔惱不得安隱故悔惱是業用是以大人之心光風霽月毫無藏護有過則人人皆見改過則人人皆仰若為人隱惡此覆不可無也五誑者謂為獲利譽矯現有德詭詐為性能障不誑邪命為業謂矯誑者心懷異謀多現不實邪命事故此即貪癡一分為體離二無別誑相用故誑者以詐欺人也矯現者假現也詭謂詭譎詐謂狙詐惑亂於他現不實事心詭為體邪命為業者謂以虗誑求利以資養身命非正命食故曰邪命比丘乞士清淨活命故此亦貪癡各一分攝六諂者謂為罔他故矯設異儀險曲為性能障不諂教誨為業謂諂曲者為罔冐他曲順時宜矯設方便為取他意或藏己失不任師友正教誨故此亦貪癡一分為體離二無別諂相用故諂者巧言令色阿諛於人也罔他者欺其不知不見而罔冐之也矯設異儀者假現奇特威儀動止不與人同也險謂險惡曲謂邪曲罔冐者欺人不知而羅織人也欺人不見而葢覆人成曲順時宜者奴顏婢膝隨風倒柂也為取他意者務以悅人而逢迎之也或藏己失者掩其不善而著其善也直心是道場是佛誠言行諂曲心是違師友正教悔也此亦貪癡各一分攝補義諂乃曲媚於人人皆以為好所謂鄉原德之賊也七憍者謂於自盛事深生染著醉傲為性能障不憍染依為業謂憍醉者生長一切雜染法故此亦貪愛一分為體離貪無別憍相用故憍者矜高自恃也於自盛事謂足於己者如富貴才能言語政事文學名勢之類由此數者深生染著或以富貴凌人傲物乃至或以文學名勢等凌人傲物眼空四海傍若無人如醉酒人為酒所弄故曰醉傲為性一切染法依之而起語曰如有周公之才之美使憍且吝其餘不足觀也已憍傲正障謙卑此亦貪一分攝由愛自盛事方生傲故瑜伽云此有七種謂無病憍少年憍族姓憍色力憍富貴憍多聞憍等八害者謂於諸有情心無悲愍損惱為性能障不害逼惱為業謂有害者逼惱他故此亦瞋恚一分為體離瞋無別害相用故害者逼惱有情無悲無愍無哀無憐無惻為體能障不害為業謂有害者逼惱他故瞋一分攝問害與瞋差別之義答害障不害正障於悲瞋障無瞋正障於慈又瞋能斷命害但損他故別也九嫉者謂殉自名利不耐他榮妬忌為性能障不嫉憂慼為業謂嫉妬者聞見他榮深懷憂慼不安隱故此亦瞋一分為體離瞋無別嫉相用故嫉者忌妬也亡身從物曰殉如俗說貪利貪名命亦不顧故曰亡身殉物謂嫉妬之人聞見他人榮貴深裏常懷憂慼不得安隱故多方以害之故曰女無妍醜入宮見妬士無賢不肖入朝見嫉此亦瞋一分攝十慳者謂躭著財法不能慧捨秘悋為性能障不慳鄙畜為業謂慳悋者心多鄙澁畜積財法不能捨故此即貪愛一分為體離貪無別慳相用故慳者吝惜也躭謂沉湎著謂固執財謂資財法謂道法有財不捨謂之守錢虜有法不施謂之啞羊僧秘謂藏於密處悋謂執吝不放手鄙畜者唯鄙澁故能畜積也此上十法唯是不善名為小隨十一無慚者謂不顧自法輕拒賢善為性能障礙慚生長惡行為業謂於自法無所顧者輕拒賢善不恥過惡障慚生長諸惡行故無慙者不自羞恥也不顧自法者人至於無羞恥則己身不顧何況道法故於一切不仁不義之事了無忌憚靡不為己於是見賢有德之人則輕易而拒絕之不相往來此無慚之性也既不親重有德則必狎近無知朋黨而成惡行此無慚之用也十二無愧者謂不顧世間崇重暴惡為性能障礙愧生長惡行為業謂於世間無所顧者崇重暴惡不恥過罪障愧生長諸惡行故無愧者不羞於人也不顧世間者謂甘心為惡之人尚不顧自身何暇復顧世人譏訶彈斥故經云有二白法能救眾生一慚二愧慚者自不作罪愧者不教他作慙者內自羞恥愧者發露向人慙者羞天愧者羞人有慚愧者可名為人若無慚愧與諸禽獸不相異也此二自類俱起但遍不善故名中隨十三不信者謂於實德能不忍樂故心穢為性能障淨信墮依為業謂不信者多懈怠故不信三相翻信應知然諸染法各有別相唯此不信自相渾濁復能渾濁餘心心所如極穢物是故說此心穢為性不信者謂無誠信也既無真實之信則於一切實事實理不能忍可於真淨德不生好樂於善功能不起樂欲又不信自心可以作佛自心可以為堯舜唯不信故不勤修治鹵莽滅裂故令心田日益荒穢如狼莠蓬蒿充塞田中故曰人而無信不知其可也然忿等諸所皆名穢法而不信一法為穢尤甚非唯自穢兼又穢人謂自不信又壞他之信心又於十一善法中但只無信心一法則餘一切法皆渾濁不成故云濁餘心心所是故說此心穢為性也此下八法自類俱起遍不善性遍諸染心三義日具故名大隨十四懈怠者謂於善惡品修斷事中懶惰為性能障精進增染為業謂懈怠者滋長染故於諸染事而䇿勤者亦名懈怠退善法故於無記事而䇿勤者於諸善品無進退故懈怠者無精進力也於善不修於惡不斷百體俱懈百事俱癈之謂故曰懶惰為性唯其日用不肯奮力於善故令諸染漸漸增長故曰增染為業故瑜伽云謂執睡眠偃臥為樂晝夜唐捐捨眾善品問戴星而出戴星而入孳孳於利汲汲於名者豈非精進答此雖䇿勤染事亦是懈怠勤於染而怠於善故染法進而善法退故唯日用孳孳為善方名䇿勤無記沒要緊事於善品中無進無退者亦名懈怠十五放逸者謂於染淨品不能防修縱蕩為性障不放逸增惡損善所依為業謂由懈怠及貪瞋癡不能防修染淨品法總名放逸非別有體放逸者放謂放蕩逸謂縱逸不簡束也集論云依止懈怠及貪瞋癡不修善法於有漏法心不防護為體增惡損善所依為業由縱蕩故惡業增長故善根損壞問此放逸以何為體答懈怠三根不能防修染淨法總名放逸離上四法別無體性十六沉者謂令心於境無堪任為性能障輕安毗婆舍那為業惛沉別相者謂即懵重令俱生法無堪任故沉者謂昧沉重謂此心所能令昭靈不昧之體漸漸昏昧漸漸沉沒無所堪能無所肩任是其性也此昏沉一法使身不得輕安而心不得入觀矣昏沉別有自性者謂即懵重問懵重與癡有何別異答癡以迷闇為相昏沉以懵重為相迷闇為相者謂一總不知不覺懵重為相者雖非一總不知不覺而由昧沉重能使身心不得輕安自在是故此二有差別懵訓昏重訓沉也十七掉舉者謂令心於境不寂靜為性能障行捨奢摩他為業由憶昔樂事生故掉舉別相謂即囂動令俱生法不寂靜故掉舉者謂掉弄輕舉俛仰四海頃刻九州令心不得暫時寂靜是其體性能障行捨及止是其業用掉舉之別相即是囂喧妄動令俱生心心所法不寂靜故障捨摩他是其業用奢摩他此云止即寂靜義由有囂動令不寂靜故以掉舉有三身掉舉亂動口掉舉亂言意掉舉亂思十八失正念者謂於諸所緣不能明記為性能障正念散亂所依為業謂失念者心散亂故失念者忘失正念也煩惱相應念為體散亂所依為業何謂散亂所依耶謂失念者心散亂故十九不正知者謂所於觀境謬解為性能障正知毀犯為業謂不正知者多所毀犯故此不正知慧與癡各一分攝不正知者謂於所觀境起邪謬解即是邪慧亦名惡慧由此邪慧故起不正知身語心行毀犯所依為業者謂於一切事不正觀察以不了知應作不應作多所毀犯故謬解如認賊為子以是為非以非為是於是毀禁犯戒無不為己如云酒肉不礙菩提路等二十散亂者謂於諸所緣令心流蕩為性能障正定惡慧習衣為業謂用亂者發惡慧故散亂別相謂即躁擾令俱生法皆流蕩故掉舉散亂二用何別彼令易解此令易緣散亂者馳散外緣故名流蕩流蕩為性者謂如水之流而亡反如波之蕩而不息也故能障正定既無正定惡慧依之而生也別相謂躁擾者由彼躁動煩擾故令俱生心心所法皆流蕩故問掉舉散亂二用何別答掉舉令心易解散亂令心易緣易者念念遷變義解以心言緣以境心如正坐禪時心念紛飛攀緣外境失其正念此為散亂此為掉舉六不定有四者謂悔眠尋伺識論曰悔眠尋伺於善染等皆不定故非如觸等定遍心故非如欲等定遍地故立不定名此釋第六位不定心所也言不定者善等屬善位染等屬染位觸等定遍心欲等定遍地此四於善染心地皆不定故通三性故立不定名一悔者謂惡作惡所作業追悔為性障止為業此即於果假立因名先惡所作業後方追悔故悔先不作亦惡作攝如追悔言我先不作如是事業是我惡作追悔為性者有二義一謂先不知己造惡業後方追思懊悔我何故作此耶此悔不可無二謂先不曾造此惡業後亦追悔我何故不作此耶此悔不可有悔善返此故惡作以追悔為性問頌卑言悔長行云悔謂惡作悔與惡作是一法耶答惡作是因悔是其體以體即因故論云悔謂惡作也問體與因何別答惡作是因悔體是果何以知之先惡所作業後方追悔故此是別理問惡先所作不善為惡作者如悔先不作善亦可謂之惡作否答亦惡作攝以不作善故追悔言我先不作如是事業是我惡先不曾作故瑜伽云謂於已作未作善不善事追變為體亦惟悔心故多不定障止為業今言悔者是借果以明因耳二眠者謂睡眠令身不自在昧略為性障觀為業謂睡眠位身不自在心極闇劣一門轉故昧簡在定略別寐時今顯睡眠非無體用有無心位假立此名睡眠者意識昏熟曰睡五情暗冥名眠昧謂暗昧略謂簡略言此心所一起之時能令此身肢節廢懈坐亦睡眠他搖動時亦不覺故又令此心暗昧簡略不能明利精審此睡眠之體也由其昧略故能障觀而為業用言心極闇劣一門轉故者闇劣釋昧字一門釋略字謂意識於寤時內外門轉若在此位唯內門轉故下復釋闇劣一門之義謂睡眠未起此心正在定時惺惺歷歷未曾昏闇睡眠一起則此心昧然不知矣故曰昧簡在定睡眠未起此心正在寤時千聲萬色無不奔赴睡眠一起則此心略然不能廣緣故曰略簡寤時也如此推審今顯睡眠非無體用必依於心雖立睡眠為無心位此亦假借無心位以顯睡眠非即無心而能令彼從有心眠以至無心故曰有無心位假立此名非實睡眠無心也以眠與心相應故三尋者謂尋求令心怱遽於意言境麤轉為性四伺者謂伺察令心怱遽於意言境細轉為性此二俱以安不安住身心分位所依為業並用思慧一分為體於意言境不深推度及深推度義類別故若離思慧尋伺二種體類差別不可得故尋求者逐於外而麤求伺察者伺於內而細察怱遽者草怱急遽也意言者意所取境多依名言故麤轉細轉為性者麤者聊且之辭細者綿密之謂言尋伺者總於一境分麤細而立二性也此二並用思慧一分為體於意言境深推曰伺即思淺推曰尋則慧深推則神凝故身心舉安淺推則躁動故身心不安若離思慧此二差別便不可得第三色法略有十一種一眼根二耳根三鼻根四舌根五身根六色塵七聲塵八香塵九味塵十觸塵十一法塵此列十一種色法也言色者有質礙之色如木不能入石故名質礙有顏色之色謂青黃等所顯之色識所依之根唯五謂眼耳鼻舌身五根乃八識攬地水火風四大所成內身為有知色根也識所緣之境則六謂色聲香味觸五塵亦是四大能所八法所造為所受用境其法塵乃外五塵落謝影子屬六識所變一半屬心一半屬境此十一法通屬八識之相分境以即心心所二所現影故下隨次釋之一眼根者能照矚一切境之義梵語斫蒭此云行盡眼能行盡諸色境故以遠近之境一目皆見是名行盡今不言行盡而翻為眼者體如蒲蔔朵用能行盡相當依唐言也二耳根者能聞之義梵語莎噌多羅戍縷多此云能聞聲以處處能聞故如十方擊鼓十處齊聞今不言能聞聲而翻為耳者體如新卷葉用能聞聲相當依唐言也三鼻根者能齅之義梵語伽羅尼羯羅拏此云能齅以能齅香臭故今不言能齅而翻為鼻者體如雙垂瓜用能齅香兼之依唐言也四舌根者能甞義梵語䑛若時吃縛此云能甞論云能除饑渴能發言論表彰呼召謂之舌今不言能甞而翻為舌者體如新偃月用能嘗味兼之依唐言也五身根者積聚依止二義名身謂積聚四大造眼等諸根皆依身根而住止故梵語迦耶此云積聚身根為彼四肢百骸依止諸根所隨一身周遍謂此身為三十六物積聚之處故名為身今不言積聚而翻為身者體如腰鼓顙義積聚依止相當依唐言也體即是根以能造地水火風及所造色香味觸八法為體乃五識所依之根也有浮塵勝義之別浮塵根乃四大麤色勝義根乃四大淨色總名色蘊以有質礙故為五識所依總是眾生之身分也六色塵者為眼根所對之境故謂青黃赤白長短方圓麤細高低光影明暗之色雖有多種總名為色為眼根之所對眼識之所取故七聲塵者四大所造之聲為耳根所對之境一切語言音聲風雷鐘鼓可意不可意之聲雖有多種總名為聲是耳識之所取故八香塵者亦四大之所造乃鼻根之所對可齅義謂好惡俱生和合變易等香為鼻識之所取故九味塵者亦四大之所造乃舌根之所對可甞義謂鹹澹甘辛可意不可意和合俱生變易等味為舌識之所取故十觸塵者亦四大所造乃色塵之觸身根所對謂輕重澀滑冷煖饑渴等觸為身識之所緣故十一法塵者乃意根所對之色謂緣過去五塵落謝影子及自識所變有可緣義此一是假境亦有多種通名色法為意識之所緣故第四不相應行法略有二十四種一得二命根三眾同分四異生性五無想定六滅盡定七無想報八名身九句身十文身十一生十二住十三老十四無常十五流轉十六定異十七相應十八勢速十九次第二十時二十一方二十二數二十三和合性二十四不和合性此列二十四種不相應行法也此二十四法言不相應者非能緣故不與心心所相應又非質礙故不與色法相應又有生滅故不與無為法相應為揀四位故名不相應此二十四法不如色心心所實有體相亦非異色心心所一分一位假立得等之名言行法者有二種一相應二不相應此簡心所乃相應行法此乃不相應行法以立其名言得者成就不失之義謂色心生起未滅壞是生緣攝受增盛之因即凡失有所得心三乘有所得果如得金時金非時得金乃是物得非是金有名而無實故云不相應也言命根者依六識能造之業所引第八種上連持一期色心不斷功能假立煖識為命根耳以識住則命存識去則命卸故言眾同分者類相似故以萬物各有同類有人法之別人同分者如天同分天與天是一類人同分則人與人是一類法同分者如心同分以心王心所是一類色同分以十一色法是一類故云依人法假立此名言異生性者煩惱所知二障種子上一分功能令六趣十二類之差別不同故云異生性此性非指佛性乃習與性成之性如人輕躁從獼猴中來如人狼毒從蛇蝎中來此乃習氣所使故云異生性也言無想定者謂六識心王不行令其身心定隱調和亦名定想等心聚悉皆不行而云無想者何也謂此外道厭想如病忻求無想以為微妙以滅想為首故立無想定名非實滅也言滅盡定者六識王所已滅及七識染分心聚皆悉滅盡乃此定相問此二定差別如何答修無想則作出離想謂外道修有漏定伏住想心不行如夾氷魚如石壓草不知微細生滅命終生無想天得四百九十九劫中想心不行此無想唯屬外道所修而滅盡乃作止息想謂二乘修無漏定六識不恒行心聚與七識染分恒行心聚皆悉不行故滅盡唯屬四果聖人故不同耳問此二定從何建立答皆於厭心種上遮礙轉識不生功能若於厭心但伏六識王所不行名無想定若於厭心使六識王所七識染分恒行心聚滅盡名滅盡定也言無想報者由在欲界修彼無想定故感彼無想天果名無想報言名身者乃諸法各有其名能詮自體單名為名如爐瓶等二名已上方名名身如香爐華瓶等三名已上名多名身如銅香爐錫華瓶等乃詮別名之身也言句身者單句為句如菩薩等二句為句身如大菩薩等三句以上為多句身如文殊菩薩普賢菩薩等以名詮自性句詮差別故言文身者文即是字能為名句二所依故若不帶詮只名字如字母及等韻之類但只訓字不能詮理若帶前名文則如經書字能詮之文帶所詮之義理故言生者先無今有言住者有位暫停或五十六十年間也言老者住別前後不同前生後死自少而壯壯而老曰衰變名老言無常者今有後無以生滅故乃死之異名葢生名為有有必後無故有非恒有以有生必有死故不如寂莫常住之無為是恒有也滅名為無無非恒無如人死此生彼不如兔角之常無也以不同無為之常有不同兔角之常無故曰無常言流轉者謂因果相續由因感果果續於因前後不斷故曰流轉言定異者謂善惡因果互相差別以善因必感樂果惡因必感苦果一定永異故云定異言相應者謂因果事業和合而起以因能感果果必應因不相違故或問此之總名不相應行法如何別中又名相應耶答此總中名不相應者乃不與前心心所相應而已此別中相應者乃前心王心所與色三法事業和合恰好之義豈相濫耶言勢速者謂有為法上遊行迅疾之義如日月往來無情變壞有情遷謝自少而壯壯而老心念生滅鳥之飛獸之走月運電奔皆此所攝故言次第者謂編列有敘如甲乙丙丁令不紊亂君則尊臣則卑父則上子則下而有左右前後之類言時者謂過現未來成住壞空年月日夜之類言方者謂色之分齊在東方則曰東方之色等故曰色之分齊如四方六合十方上下之類言數者度量諸法之名如權衡升斗丈尺等或一十百千之類言和合者謂於諸法不相乖反和如水乳和合如函葢合也言不和合者謂於諸法相乖反故如眼與耳了不相觸前諸法和合如相順因此諸法不和合如相違因或問曰此二十四法於前三位則以何法當何位答大略而言命根一法唯屬心王乃第八種上連持一期色心不斷功能故異生性一法唯屬心所以根隨煩惱是惡心所故乃二障種上令趣類差別功能故無想滅盡定及無想報乃王所上假立以王所想受等已滅名無想等餘十九種通色及心心所法三位上假立如眾同分乃根身世界五塵等為色同分同依同緣為心同分同起善惡為所同分如勢速乃色心心所遷流不停如定異一法色不是心心王不是心所善因惡果等定不互感故此上諸法雖不造業乃分位唯識故云分位差別故名不相應行法也第五無為法者略有六種一虗空無為二擇滅無為三非擇滅無為四不動無為五想受滅無為六真如無為此列六種無為之名也言無為者乃前四位真實之性故云識實性乃第五實性唯識識實性故以六位心所則識之相應乃第二相應唯識識相應故十一色法乃識之所緣即第三所緣唯識識所緣故二十四不相應即識之分位乃第四分位唯識識分位故識是其四位之體故總云識實性也前九十四種謂有為法屬凡夫生死法以有所作為故今此六種謂無為法屬三乘出世法以無所作為故前名煩惱障此名所知障此六無為雖云出世然亦兼凡夫但約無所作為義說無為耳蓋虗空非擇滅真如此三無為乃大乘菩薩所證擇滅乃二乘所得不動乃四禪天人所修捨定苦樂不動故想受滅乃四空天人想受不行有此不同耳一虗空無為者此從觀得名謂由修無我觀所顯真理似虗空相離一切色心等諸法障礙故云虗空補義此依識變故屬有我正起信之我見也二擇滅無為者擇謂揀擇乃能擇之智滅謂斷滅乃所滅之根隨煩惱謂由無漏智擇揀諸惑能顯滅理以斷諸障染因擇力所得滅理故云擇滅乃二乘析色明空所證涅槃耳三非擇滅無為者非由擇力滅惑所得但本性清淨及緣闕所顯故緣闕者俱舍云永礙當生得非擇滅當生者當來生法緣會則生緣闕不生謂能永害未來法生得滅異前以得不由擇但由緣闕名非擇滅如眼與意專一色時餘色聲香味觸等謝緣彼境界五識身等住未來世畢竟不生由彼不能緣過去境緣不具故得非擇滅釋云謂眼緣色時耳等亦合緣聲等以專注色故耳不緣色等同時聲等剎那已謝故令緣聲等識更不復生以前五識唯緣現量不緣過未故四不動無為者雖前三定至第四禪永離三災謂火燒初禪水渰二禪風刮三禪出八難謂憂苦喜樂尋伺出入息故無喜樂動搖身心所顯真理故云不動補義此正四禪天定亦屬五那含天五想受滅無為者謂已離無所有處欲超過有頂暫止息想作意為先故諸不恒行心心所滅及恒行一分心心所滅以想受不行所顯真理故云想受滅六真如無為者謂言說之極無有可說故強名真如言真如者離外道之倒及二乘之妄不妄不變理非倒妄故名真如前五無為皆依真如體上假立名空等此六種無為識論說略有二種一依識變假施設有二依法性假施設有言依識變假施設有者謂曾聞佛說如虗空等名隨起分別作虗空等相復假觀法數數熏習力故則於觀心中有似虗空等相現此所現無為相變帶而起前後相似無有變易假說為常以唯識變故非真常此該六種無為乃地前比觀所修當屬有漏若地上後得智變即無漏也二依法性假施設有者謂空無我所顯真如有無俱非心言路絕與一切法非一切法是法真實之理故名法性離諸障礙故名虗空是則前五無為皆依真如實德也此體須證人法二空無我之後方得顯故乃地上所證今言皆無我者乃約前識變者故說有我其依法性真如修所顯者為真真如性若依性宗圓覺經云乃至證得無上涅槃皆名我相故亦屬有我今論六種但說依識變者論初標云如世尊言一切法無我設有二問何等一切法云何為無我以上乃明一切法乃答初問已竟下答次問云何為無我言無我者略有二種一補特伽羅無我二者法無我一補特伽羅無我者即我無我也我者主宰義自在義若實有我應當人常在世為人天常在天為天不流轉諸趣受生死纔是自在實用今見起惑造業則有生滅往來遷變則知都無主宰自在實用矣又梵語補特伽羅此云數取趣謂諸有情數數起惑造業名為能取之因當來五趣受生名為所取之果此葢就凡夫所執分別五蘊假我及外道所執之神我以取分段生死之苦者而言也若二乘所執蘊即離我及涅槃我亦屬分別若凡夫俱生及地上菩薩未破藏識七地已前所斷俱生我執如論所言無始虗妄熏習內因力故葢指習氣而言也今論云一切無我以聖教量盡皆破之方盡大乘之意也二法無我者謂我所執之法也言法者軌生物解任持自性之義謂真如而為眾生自性故今言真如眾生即解以有自性軌持令生解故又諸法各有自體不失而能軌物令生解故只如香爐不作花瓶之解是有軌則之義故得法之名雖復任持軌生物解而亦無勝性實自在用故若實有我則萬物應無生滅成壞今見國土遷壞萬物生滅無常故知諸法亦無我也然凡夫法執者即根身器界六塵依報也外道所執各有多種本出西域有六家七宗各立異見以為所安此乃外道法執二乘法執即所取偏空涅槃此通名分別法執也菩薩所執取證真如論曰現前立少物謂是唯識性以有所得故非實住唯識以有證得是為微細法執所謂存我覺我俱名障礙故八地已證平等真如尚起貪著是謂微細法執乃菩薩俱生法執也此執未空故未盡異熟異屬因熟屬果故尚屬因果直至金剛道後異熟空時即入果海即起信云菩薩地盡覺心初起心無初相遠離微細念故得見心性心即常住名究竟覺是則按此百法前九十四種乃凡夫外道所執人法二我六種無為乃二乘菩薩所執人法二我以雖證涅槃真如猶屬迷悟對待總屬生滅邊收正起信中對生滅之真如也故今生滅情忘聖凡不立方極一心之源故皆無之此實即相歸性之極則也葢我法二執有麤有細麤者名分別我法二執細者名俱生我法二執此麤細二種執返妄歸真從麤至細始從凡夫作生空觀熏修至七信位斷分別我執從八信位作法空觀熏修歷三賢至初地初心斷分別法執故云分別二障極喜無從二地作真如觀至七地斷俱生我執從八地至等覺金剛心中斷俱生法執故云六七俱生地地除第七修道除種現金剛道後總皆無到此方纔破盡淨此二執即證一心是名為佛今此二無我則麤細二種皆在其中矣按識論云然諸我執略有二種一者俱生二者分別俱生我執無始時來虗妄熏習內因力故恒與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識起自心相執為實我二有間斷在第六識緣識所變五取蘊相或總或別起自心相此二我執細故難斷後修道中數數修習勝生空觀方能除滅分別我執亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯在第六意識中有此亦二種一緣邪教所說蘊相起自心相分別計度執為實我二緣邪教分說我相起自心相分別計度執為實我此二我執麤故易斷初見道時觀一切法生空真如即能除滅補義曰按識論所說俱生二種我執單屬凡夫分別我執屬外道小乘且凡夫我執招分段生死者故云數取趣謂數數造業取五趣生死也如是若言登地乃斷豈三賢未離分段生死耶此與斷證位中大難會合從來所未明也若約斷證從初發心至七信位同除四住則已離分段生死證我空矣楞伽云須陀洹俱生身見斷何待登地是則從八信已後皆屬變易生死豈有未得我空而能變易生死耶此又大難會合也然據論明文豈敢妄議但難會通不無其說然經論共說分段生死煩惱障招變易生死所知障招故今論云數取趣者是約煩惱障說即憎愛煩惱正屬分別二執乃凡夫不了無我於心外妄起分別實有諸法又執此法有實主宰則與外道二乘邪分別同是則論以俱生單在地上分別單屬外道二乘約多分說其實分別二執凡夫不無今言登地斷者論云由內因力是單約二執習氣種子而言其凡夫分別乃煩惱耳故論略之又曰梵語補特伽羅此云數取趣然此正明我無我而云數取趣者此非敵體而翻乃約義而翻者也應的體云我因執我故數數造業以取未來諸趣生死葢約我能造業因我以取未來生死耳今人但只講數取趣義竟失我之名故使學人難明也然五趣生死乃煩惱障招若說此為俱生我執豈地上菩薩又招五趣生死耶故予所言難會合者此也然云修道位中除種現是知俱生但約習氣而煩惱障猶屬分別
