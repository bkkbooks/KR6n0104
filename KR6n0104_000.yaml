body:
  text: 此百法論以門稱者乃入大乘之門是知此乃性相二宗之關要凡義學者未有不明此法而能窮諸法門者以古補注但直取論文為注是則以論解論豈初心所能入耶以不知所本故也以向來本論無釋故從前相沿至今耳今識論雖有注釋而百法行相具在論中而注隨本論故此百法竟莫能通以師承槩視故學者不知其要耳老人每示學人凡入佛法必從此始侍者廣益初苦其難老人教以探討本論故遂録論文為釋者仍取三家疏義參合以釋論纂成一貫則了然易見是以此纂尤為入百法之初步也其疏義有所不備者則取直解或問取豫補義云天啓壬戌夏日七十七翁憨山老人手批大乘百法規矩纂釋序大師之釋經論也不逞新不炫奇直就本文宗趣上一眼覷透先得言外之旨便于融會貫穿中平實妥貼銷文顯義務得佛意而止故不特振中興祖道實朗義日于性天誠末法一大光明幢也在昔弟子中最號入室師資道合者有若憑孝廉啓南先生而大師于時日不暇給法道猶有待也今著述且大備而前人往矣我輩何幸與一時諸上足親承座下豈不亦人人生尊重難遭之想惟時虗中益公年最少悟最蚤士稱三日當刮目不侫與公菩提樹下一別如昨日耳而公之丰神學問脫體非昔人也其攻苦鑽研猶曰事在勉強而已若夫圍繞一會之頃微言奧義如野鴈無人之態兔起鶻落之機他人拙以滯者公偏迎刃而劃然解也會于心而傳于口能令聽者精神飛躍恍若聆圓音于再演有莫知其然者嗟夫虎嘯而風烈龍興而致雲有窺基而弉師之道益光有生肇而童壽之義愈贍意公其殆乘願輪以續慧命者歟不然何夙悟之若此嗣是而虗以大之謙以光之行以實之證以臻之皆公之能事也當家種草何俟於人百法規矩纂注具見公之苦心然亦微露一班耳大師已有題詞茲不敢贅但公謙欲韞之匱不侫願宜公諸衆故僭敘數語以為勸請如此天啓二年歲次壬戌夏至日嶺南仲安劉起相和南拜撰題百法明門八識規矩纂釋後余不敏天黜其形自信有尊形者存故夙抱超然之志在齠齓即聞我大師法雷起蟄時則躍然歸依結想有年往癸丑歲從先人宦遊於衡適禮大師於靈湖即蒙攝受時見虗中益公其精敏機警知為法器然未識所志向及丁巳夏大師歸老匡廬之五乳峰下余以二親見背乃決志依歸求出世業於辛酉春始判然入山大師憐之從入室後得聞法要朝夕與公商確奧義洞徹言外余躍然喜也不唯與之忘形抑忘心矣食息靡間一日見公案頭百法規矩纂釋展卷同劉孝廉仲安氏閲之一讀三歎曰公之精義入神之如此也心雖不間於宗案習聞此論雖老師宿學亦苦于難入蓋以論釋論文簡義幽且斷章不備況舊無解故多面墻近則本論釋有數家又未參合於此猶然故吾此末學所以泣岐也今公詳論文於名相之下取古今諸疏會通一貫且得親聞大師之心印而折衷之故文如析薪義若觀火不勞旁搜曲討而洞達法相之源不異三車執筆也意別數載何公超悟之蚤而入法之精如此詎非拔靈根於虗壤者未易易也顧豫與公大有夙契愧不能讚其萬一聊述此以紀法緣之始末云天啓二年歲在壬戌之秋七月既望秣陵遺民方遠題于五乳峰下之溪上閣百法規矩纂釋後敘余自降心白業歸命佛乘時抱出塵之志切喜依教尋源惟以如來法海汪洋義天廣博於奢摩他路未能下手每開卷未嘗不望涯而嘆也及詢諸尊宿咸教以先明起信百法諸論云此乃一大藏之關鍵如欲萬里之行始於足下未有足下之步不移而能之萬里者是知百法規矩乃足下之步也故曰明得百法可入大乘之門矣余即簡魯菴補注見其文約義幽猶然故吾罕得其要丙寅秋適匡山虗公來遊黃山錫過白嶽余與家仲兄遇於汶上首請楞嚴三觀次及圓覺起信而師每發一言義出常見酬一難理徹玄微所謂獅兒哮吼自與羣獸別也一日於師囊中搜得此纂與仲兄捧覽三復不覺從前滯礙劃然已解百法則詳而備規矩則簡而明使初學之士一見了然無復泣岐之歎矣持斯鑰而竟探寶藏頓獲家珍豈不快哉余曰此希有之法曷不公諸宇內師謙而祕之余堅請得壽諸梓以廣法施願諸學者因言得義了義明心庶不負虗師亦不負自己是為敘時崇禎四年歲次辛未花朝天都弟子在新程開裕拜撰并書
